<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>asgn0</title>
</head>

<body onload="main()">
  <canvas id="example" width="400" height="400">
    Please use a browser that supports "canvas"
  </canvas>

  <br />

  <label>V1: </label>
  <label for"v1x">X</label>
  <input id="v1x" type="number" />

  <label for"v1y">Y</label>
  <input id="v1y" type="number" />

  <br />

  <label>V2: </label>
  <label for"v2x">X</label>
  <input id="v2x" type="number" />

  <label for"v2y">Y</label>
  <input id="v2y" type="number" />



  <br />
  <button id="draw" type="button" onclick="handleDrawEvent()">Draw</button>

  <br />

  <label for="ops">Operation:</label>

  <select name="ops" id="ops">
    <option value="add">Add</option>
    <option value="sub">Subtract</option>
    <option value="mul">Multiply</option>
    <option value="div">Divide</option>
    <option value="mag">Magnitude</option>
    <option value="norm">Normalize</option>
    <option value="area">Area</option>
    <option value="angl">Angle between</option>
  </select>

  <label for="scalar">Scalar:</label>
  <input id="scalar" type="number" />

  <br />

  <button id="draw2" type="button" onclick="handleDrawOperationEvent()">Draw</button>

  <script src="asgn0.js"></script>
  <script src="./lib/cuon-matrix-cse160.js"></script>
</body>

</html>
